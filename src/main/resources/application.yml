server:
  port: 8081
spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/catalog_service_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    sql-migration-prefix: ""
    sql-migration-separator: "_"
    sql-migration-suffixes: .sql
    out-of-order: false

clients:
  catalog-service:
    url: http://localhost:8081
  user-service:
    url: http://localhost:8083


security:
  jwt:
    secret: "very-secret-key-very-secret-key-1234567890"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always